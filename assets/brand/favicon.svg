<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#2B18BC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#08091a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="t0" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C8D7FF" stop-opacity="0"/><stop offset="100%" stop-color="#C8D7FF" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#B4C8F5" stop-opacity="0"/><stop offset="100%" stop-color="#B4C8F5" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#DCE6FF" stop-opacity="0"/><stop offset="100%" stop-color="#DCE6FF" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#A0B9F0" stop-opacity="0"/><stop offset="100%" stop-color="#A0B9F0" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D2E1FF" stop-opacity="0"/><stop offset="100%" stop-color="#D2E1FF" stop-opacity="0.85"/></linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- 5 V-step bars: ratios 1.0, 0.82, 0.65, 0.75, 0.93 -->
  <!-- bar area: x=12..52 (width 40), y=14..50 (step 9) -->
  <line x1="12" y1="14" x2="52"   y2="14" stroke="url(#t0)" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="12" y1="23" x2="44.8" y2="23" stroke="url(#t1)" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="38"   y2="32" stroke="url(#t2)" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="12" y1="41" x2="42"   y2="41" stroke="url(#t3)" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="49.2" y2="50" stroke="url(#t4)" stroke-width="2.4" stroke-linecap="round"/>
  <!-- comet dots -->
  <circle cx="52"   cy="14" r="2.6" fill="#C8D7FF"/>
  <circle cx="44.8" cy="23" r="2.4" fill="#B4C8F5"/>
  <circle cx="38"   cy="32" r="2.2" fill="#DCE6FF"/>
  <circle cx="42"   cy="41" r="2.3" fill="#A0B9F0"/>
  <circle cx="49.2" cy="50" r="2.5" fill="#D2E1FF"/>
  <!-- core highlights -->
  <circle cx="52"   cy="14" r="1"   fill="#ffffff" opacity="0.9"/>
  <circle cx="44.8" cy="23" r="0.9" fill="#ffffff" opacity="0.9"/>
  <circle cx="38"   cy="32" r="0.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="42"   cy="41" r="0.9" fill="#ffffff" opacity="0.9"/>
  <circle cx="49.2" cy="50" r="0.95" fill="#ffffff" opacity="0.9"/>
</svg>
