<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="35%" cy="55%" r="70%">
      <stop offset="0%"  stop-color="#2B18BC" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#6B7ACC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#08091a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="bar0" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C8D7FF" stop-opacity="0"/><stop offset="100%" stop-color="#C8D7FF" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#B4C8F5" stop-opacity="0"/><stop offset="100%" stop-color="#B4C8F5" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#DCE6FF" stop-opacity="0"/><stop offset="100%" stop-color="#DCE6FF" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#A0B9F0" stop-opacity="0"/><stop offset="100%" stop-color="#A0B9F0" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D2E1FF" stop-opacity="0"/><stop offset="100%" stop-color="#D2E1FF" stop-opacity="0.85"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#08091a"/>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Star field (sparse, decorative) -->
  <g fill="#ffffff">
    <circle cx="120" cy="90"  r="1.2" opacity="0.55"/>
    <circle cx="220" cy="140" r="0.8" opacity="0.4"/>
    <circle cx="80"  cy="220" r="1.0" opacity="0.5"/>
    <circle cx="310" cy="60"  r="0.9" opacity="0.45"/>
    <circle cx="970" cy="80"  r="1.3" opacity="0.6"/>
    <circle cx="1080" cy="160" r="0.9" opacity="0.45"/>
    <circle cx="880" cy="260" r="0.7" opacity="0.35"/>
    <circle cx="1140" cy="340" r="1.1" opacity="0.5"/>
    <circle cx="930" cy="520" r="0.8" opacity="0.4"/>
    <circle cx="1050" cy="560" r="0.9" opacity="0.45"/>
    <circle cx="150" cy="510" r="1.0" opacity="0.5"/>
    <circle cx="60"  cy="430" r="0.7" opacity="0.35"/>
    <circle cx="290" cy="560" r="0.8" opacity="0.4"/>
  </g>

  <!-- Right-side visual: bars + comet dots -->
  <g transform="translate(820, 200)">
    <line x1="0" y1="0"    x2="270" y2="0"    stroke="url(#bar0)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="55"   x2="221" y2="55"   stroke="url(#bar1)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="110"  x2="175" y2="110"  stroke="url(#bar2)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="165"  x2="202" y2="165"  stroke="url(#bar3)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="220"  x2="251" y2="220"  stroke="url(#bar4)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="270" cy="0"   r="8" fill="#C8D7FF"/>
    <circle cx="221" cy="55"  r="7.5" fill="#B4C8F5"/>
    <circle cx="175" cy="110" r="7" fill="#DCE6FF"/>
    <circle cx="202" cy="165" r="7.2" fill="#A0B9F0"/>
    <circle cx="251" cy="220" r="7.8" fill="#D2E1FF"/>
    <circle cx="270" cy="0"   r="3" fill="#ffffff"/>
    <circle cx="221" cy="55"  r="2.8" fill="#ffffff"/>
    <circle cx="175" cy="110" r="2.6" fill="#ffffff"/>
    <circle cx="202" cy="165" r="2.7" fill="#ffffff"/>
    <circle cx="251" cy="220" r="2.9" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Satoshi, -apple-system, Helvetica, Arial, sans-serif">
    <!-- Eyebrow -->
    <text x="80" y="200" font-size="20" font-weight="500" fill="#A4BEF2" letter-spacing="4">[ FOUNDER-LED ]</text>

    <!-- Headline -->
    <text x="80" y="290" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">Strategy built on</text>
    <text x="80" y="368" font-size="68" font-weight="800" letter-spacing="-2">
      <tspan fill="#A4BEF2" font-style="italic">ethics.</tspan>
      <tspan fill="#ffffff"> Impact built</tspan>
    </text>
    <text x="80" y="446" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">to last.</text>

    <!-- Sub -->
    <text x="80" y="510" font-size="20" font-weight="300" fill="rgba(255,255,255,0.55)">Consulting for organizations committed to doing good — the right way.</text>

    <!-- URL tag -->
    <text x="80" y="570" font-size="18" font-weight="500" fill="#6B7ACC" letter-spacing="2">ETHOSTRATEGY.CO</text>
  </g>
</svg>
